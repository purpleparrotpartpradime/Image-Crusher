<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCD Webcam</title>
<style>
body{margin:0;background:#0b0b0f;color:#fff;font-family:system-ui,Arial;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.wrap{width:640px}
.stage{position:relative;width:640px;height:480px;background:#000}
canvas{position:absolute;left:0;top:0;width:640px;height:480px}
.controls{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:10px;background:#111;color:#fff;border:1px solid #333;cursor:pointer;font-family:Courier New}
button:hover{background:#1a1a1a}
#error{position:absolute;left:10px;top:10px;color:#ff4d4d;font-family:Courier New;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
<div class="stage">
<canvas id="gl"></canvas>
<div id="error"></div>
</div>
<div class="controls">
<button id="snap">Snap Photo (JPG)</button>
<button id="rec">Start Recording (MP4)</button>
</div>
</div>

<video id="vid" autoplay playsinline style="display:none"></video>
<canvas id="txt" width="640" height="480" style="display:none"></canvas>

<script>
const video=document.getElementById("vid")
const glCanvas=document.getElementById("gl")
const txtCanvas=document.getElementById("txt")
const tctx=txtCanvas.getContext("2d")
const errorBox=document.getElementById("error")

let recording=false
let recorder
let chunks=[]

navigator.mediaDevices.getUserMedia({video:{width:640,height:480},audio:true})
.then(s=>{
video.srcObject=s
})
.catch(err=>{
errorBox.textContent="Camera/Mic blocked or unavailable: "+err.name
})

const gl=glCanvas.getContext("webgl")
glCanvas.width=640
glCanvas.height=480

const vs=`attribute vec2 p;varying vec2 uv;void main(){uv=(p+1.0)*0.5;gl_Position=vec4(p,0.0,1.0);}`
const fs=`precision mediump float;uniform sampler2D uTex;uniform sampler2D uTxt;uniform float uTime;varying vec2 uv;
float n(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
void main(){
vec2 r=vec2(640.0,480.0);
vec2 uv2=floor(uv*r)/r;
vec3 c=texture2D(uTex,uv2).rgb;
c=mix(c,c*c*1.25,0.35);
c.r*=1.08;
c.g*=1.02;
c.b*=0.9;
float g=n(uv*r+vec2(fract(sin(uTime)*1000.0)));
c+=g*0.08;
vec4 t=texture2D(uTxt,uv);
c=mix(c,t.rgb,t.a);
gl_FragColor=vec4(c,1.0);
}`

function sh(type,src){
const s=gl.createShader(type)
gl.shaderSource(s,src)
gl.compileShader(s)
return s
}

const prog=gl.createProgram()
gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs))
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs))
gl.linkProgram(prog)
gl.useProgram(prog)

const buf=gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER,buf)
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW)

const loc=gl.getAttribLocation(prog,"p")
gl.enableVertexAttribArray(loc)
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)

const tex=gl.createTexture()
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)

const txtTex=gl.createTexture()
gl.bindTexture(gl.TEXTURE_2D,txtTex)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)

const uTimeLoc=gl.getUniformLocation(prog,"uTime")

function updateText(){
const d=new Date()
const pad=n=>String(n).padStart(2,"0")
const str=`JAN.${pad(d.getDate())}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`
tctx.fillStyle="#000"
tctx.fillRect(0,0,640,480)
tctx.font="20px Courier New"
tctx.fillStyle="#ff7a00"
tctx.fillText(str,430,460)
}

function draw(t){
if(video.readyState>=2){
gl.uniform1f(uTimeLoc,t*0.001)
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video)
updateText()
gl.bindTexture(gl.TEXTURE_2D,txtTex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,txtCanvas)
gl.drawArrays(gl.TRIANGLE_STRIP,0,4)
}
requestAnimationFrame(draw)
}
requestAnimationFrame(draw)

document.getElementById("snap").onclick=()=>{
const c=document.createElement("canvas")
c.width=640
c.height=480
const cx=c.getContext("2d")
cx.drawImage(glCanvas,0,0)
c.toBlob(b=>{
const a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="ccd.jpg"
a.click()
},"image/jpeg",0.6)
}

document.getElementById("rec").onclick=()=>{
if(!recording){
let stream=glCanvas.captureStream(30)
let aud=video.srcObject?.getAudioTracks?.()
if(aud&&aud.length) stream.addTrack(aud[0])
let mime="video/mp4"
if(!MediaRecorder.isTypeSupported(mime)) mime="video/webm"
recorder=new MediaRecorder(stream,{mimeType:mime})
recorder.ondataavailable=e=>chunks.push(e.data)
recorder.onstop=()=>{
let blob=new Blob(chunks,{type:mime})
chunks=[]
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ccd."+mime.split("/")[1]
a.click()
}
recorder.start()
recording=true
document.getElementById("rec").innerText="Stop & Save"
}else{
recorder.stop()
recording=false
document.getElementById("rec").innerText="Start Recording (MP4)"
}
}
</script>
</body>
</html>
