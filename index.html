<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCD Camera</title>
<style>
body{margin:0;background:#0b0b10;display:flex;justify-content:center;align-items:center;height:100vh}
.wrap{width:640px}
.stage{position:relative;width:640px;height:480px;background:#000}
canvas{position:absolute;left:0;top:0;width:640px;height:480px}
.controls{display:flex;gap:10px;margin-top:10px}
button{flex:1;padding:10px;background:#111;color:#fff;border:1px solid #333;font-family:Courier New}
#error{position:absolute;top:10px;left:10px;color:#ff5555;font-family:Courier New;font-size:12px}
</style>
</head>
<body>

<div class="wrap">
<div class="stage">
<canvas id="gl"></canvas>
<div id="error"></div>
</div>

<div class="controls">
<button id="snap">Snap</button>
<button id="rec">Record</button>
</div>
</div>

<video id="vid" autoplay playsinline muted style="display:none"></video>
<canvas id="hud" width="640" height="480" style="display:none"></canvas>

<script>
const video=document.getElementById("vid")
const glCanvas=document.getElementById("gl")
const hud=document.getElementById("hud")
const hctx=hud.getContext("2d")
const err=document.getElementById("error")

glCanvas.width=640
glCanvas.height=480

const gl=glCanvas.getContext("webgl")

let stream=null
let recorder=null
let chunks=[]
let ready=false

const vs=`attribute vec2 p;varying vec2 uv;void main(){uv=(p+1.0)*0.5;gl_Position=vec4(p,0.0,1.0);}`

const fs=`precision mediump float;
uniform sampler2D tex;
uniform sampler2D hudTex;
varying vec2 uv;

float n(vec2 p){
return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);
}

void main(){
vec2 r=vec2(640.0,480.0);
vec2 cuv=floor(uv*r)/r;

vec3 c=texture2D(tex,cuv).rgb;

c=c*c*1.1;
c.r*=1.12;
c.g*=1.02;
c.b*=0.86;

c+=n(uv*r)*0.05;

vec4 h=texture2D(hudTex,uv);
c=mix(c,h.rgb,h.a);

gl_FragColor=vec4(c,1.0);
}`

function shader(t,s){
const sh=gl.createShader(t)
gl.shaderSource(sh,s)
gl.compileShader(sh)
return sh
}

const prog=gl.createProgram()
gl.attachShader(prog,shader(gl.VERTEX_SHADER,vs))
gl.attachShader(prog,shader(gl.FRAGMENT_SHADER,fs))
gl.linkProgram(prog)
gl.useProgram(prog)

const buf=gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER,buf)
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW)

const loc=gl.getAttribLocation(prog,"p")
gl.enableVertexAttribArray(loc)
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)

const tex=gl.createTexture()
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE)

const hudTex=gl.createTexture()
gl.bindTexture(gl.TEXTURE_2D,hudTex)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)

function pad(n){return String(n).padStart(2,"0")}

function drawHUD(){
const d=new Date()
const t=`JAN.${pad(d.getDate())}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`

hctx.fillStyle="#000"
hctx.fillRect(0,0,640,480)
hctx.font="20px Courier New"
hctx.fillStyle="#ff7a00"
hctx.fillText(t,420,470)
}

function render(){
if(!ready)return requestAnimationFrame(render)

gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video)

drawHUD()

gl.bindTexture(gl.TEXTURE_2D,hudTex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,hud)

gl.drawArrays(gl.TRIANGLE_STRIP,0,4)

requestAnimationFrame(render)
}

async function start(){
try{
stream=await navigator.mediaDevices.getUserMedia({
video:{width:640,height:480},
audio:true
})

video.srcObject=stream

video.onloadedmetadata=async()=>{
await video.play()
ready=true
requestAnimationFrame(render)
}

}catch(e){
err.textContent=e.name
}
}

start()

document.getElementById("snap").onclick=()=>{
const c=document.createElement("canvas")
c.width=640
c.height=480
c.getContext("2d").drawImage(glCanvas,0,0)
c.toBlob(b=>{
const a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="ccd.jpg"
a.click()
},"image/jpeg",0.7)
}

document.getElementById("rec").onclick=()=>{
if(!recording){
chunks=[]
let s=glCanvas.captureStream(30)

if(stream){
stream.getAudioTracks().forEach(t=>s.addTrack(t))
}

recorder=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported("video/mp4")?"video/mp4":"video/webm"})

recorder.ondataavailable=e=>e.data.size&&chunks.push(e.data)

recorder.onstop=()=>{
const b=new Blob(chunks,{type:recorder.mimeType})
const a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="ccd."+recorder.mimeType.split("/")[1]
a.click()
}

recorder.start()
recording=true
document.getElementById("rec").innerText="Stop"
}else{
recorder.stop()
recording=false
document.getElementById("rec").innerText="Record"
}
}
</script>

</body>
</html>
